lazerwiki.datasource.url=jdbc:h2:mem:db;mode=mysql;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'src/test/resources/db_init/db.sql'
lazerwiki.datasource.username=sa
